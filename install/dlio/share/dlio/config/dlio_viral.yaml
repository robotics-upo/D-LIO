dlio_node:
  ros__parameters:

    # ── ROS Topics ──────────────────────────────────────────────
    in_cloud:     "/os1_cloud_node1/points"
    in_cloud_aux: "/os1_cloud_node2/points"
    in_imu:       "/imu/imu"

    # ── Sensor Frequencies ──────────────────────────────────────
    hz_cloud: 10.0
    hz_imu:   385.0

    # ── ESKF ────────────────────────────────────────────────────
    calibration_time:  5.0
    use_fixed_imu_dt:  true
    imu_acc_in_ms2:    true
    gyr_dev:           0.057396706572
    gyr_rw_dev:        2.66e-07
    acc_dev:           0.565432018302
    acc_rw_dev:        0.000433

    # ── Multi-LiDAR ────────────────────────────────────────────
    aux_lidar_en: true

    # ── Frames ──────────────────────────────────────────────────
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # ── Keyframing ──────────────────────────────────────────────
    keyframe_dist: 1.5
    keyframe_rot:  1.5

    # ── TDF Grid ────────────────────────────────────────────────
    tdfGridSizeX_low:  -100.0
    tdfGridSizeX_high:  100.0
    tdfGridSizeY_low:  -100.0
    tdfGridSizeY_high:  100.0
    tdfGridSizeZ_low:   -10.0
    tdfGridSizeZ_high:   40.0
    tdf_grid_res:         0.05

    # ── Solver ──────────────────────────────────────────────────
    solver_max_iter:    200
    solver_max_threads:  20
    robust_outlier_dist:  0.5

    # ── Point Cloud Processing ──────────────────────────────────
    lidar_type:      "ouster"
    min_range:        1.0
    max_range:      100.0
    leaf_size_map:   -1.0
    leaf_size_opt:   -1.0
    timestamp_mode:  "END_OF_SCAN"
    kGridMarginFactor: 0.8
    maxload:        100.0
    maxCells:       400000
