dlio_node:
  ros__parameters:

    # ── ROS Topics ──────────────────────────────────────────────
    in_cloud:     "/ouster/points"
    in_cloud_aux: "/nada"
    in_imu:       "/imu/data"

    # ── Sensor Frequencies ──────────────────────────────────────
    hz_cloud: 10.0
    hz_imu:   100.0

    # ── ESKF ────────────────────────────────────────────────────
    calibration_time:  0.0
    use_fixed_imu_dt:  true
    imu_acc_in_ms2:    true
    gyr_dev:           0.034929939543128923
    gyr_rw_dev:        1.0106430876706567e-05
    acc_dev:           0.0311800668934690885
    acc_rw_dev:        1.4361954439703917e-04

    # ── Multi-LiDAR ────────────────────────────────────────────
    aux_lidar_en: false

    # ── Frames ──────────────────────────────────────────────────
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # ── Keyframing ──────────────────────────────────────────────
    keyframe_dist: 1.0
    keyframe_rot:  2200.0

    # ── TDF Grid ────────────────────────────────────────────────
    tdfGridSizeX_low:  -300.0
    tdfGridSizeX_high:  400.0
    tdfGridSizeY_low:  -300.0
    tdfGridSizeY_high:  300.0
    tdfGridSizeZ_low:   -10.0
    tdfGridSizeZ_high:   40.0
    tdf_grid_res:         0.05

    # ── Solver ──────────────────────────────────────────────────
    solver_max_iter:    100
    solver_max_threads:  20
    robust_outlier_dist:  5.0

    # ── Point Cloud Processing ──────────────────────────────────
    lidar_type:      "ouster"
    min_range:        1.0
    max_range:      100.0
    leaf_size_map:    0.1
    leaf_size_opt:    0.5
    kGridMarginFactor: 0.8
    maxload:        100.0
    maxCells:       250000
