dlio_node:
  ros__parameters:

    # ── ROS Topics ──────────────────────────────────────────────
    in_cloud:     "/robot1/livox/lidar"
    in_cloud_aux: "/none"
    in_imu:       "/robot1/livox/imu"

    # ── Sensor Frequencies ──────────────────────────────────────
    hz_cloud: 10.0
    hz_imu:   200.0

    # ── ESKF ────────────────────────────────────────────────────
    calibration_time:  0.0
    use_fixed_imu_dt:  false
    imu_acc_in_ms2:    false
    gyr_dev:           0.05
    gyr_rw_dev:        2.66e-07
    acc_dev:           0.5
    acc_rw_dev:        0.000433

    # ── Multi-LiDAR ────────────────────────────────────────────
    aux_lidar_en: false

    # ── Frames ──────────────────────────────────────────────────
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # ── Keyframing ──────────────────────────────────────────────
    keyframe_dist: 1.5
    keyframe_rot:  1.5

    # ── TDF Grid ────────────────────────────────────────────────
    tdfGridSizeX_low:  -200.0
    tdfGridSizeX_high:  200.0
    tdfGridSizeY_low:  -200.0
    tdfGridSizeY_high:  200.0
    tdfGridSizeZ_low:   -10.0
    tdfGridSizeZ_high:  100.0
    tdf_grid_res:         0.1

    # ── Solver ──────────────────────────────────────────────────
    solver_max_iter:    200
    solver_max_threads:  20
    robust_outlier_dist:  2.5

    # ── Point Cloud Processing ──────────────────────────────────
    lidar_type:      "livox"
    min_range:        0.5
    max_range:       50.0
    leaf_size_map:   -1.0
    leaf_size_opt:   -1.0
    timestamp_mode:  "START_OF_SCAN"
    kGridMarginFactor: 0.8
    maxload:         50.0
    maxCells:       250000
