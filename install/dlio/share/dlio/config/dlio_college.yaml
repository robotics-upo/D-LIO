dlio_node:
  ros__parameters:

    # ── ROS Topics ──────────────────────────────────────────────
    in_cloud:     "/os_cloud_node/points"
    in_cloud_aux: "/nada"
    in_imu:       "/os_cloud_node/imu"

    # ── Sensor Frequencies ──────────────────────────────────────
    hz_cloud: 10.0
    hz_imu:   100.0

    # ── ESKF ────────────────────────────────────────────────────
    calibration_time:  0.0
    use_fixed_imu_dt:  true
    imu_acc_in_ms2:    true
    gyr_dev:           0.0517396706572
    gyr_rw_dev:        2.66e-07
    acc_dev:           0.05115432018302
    acc_rw_dev:        3.33e-07

    # ── Multi-LiDAR ────────────────────────────────────────────
    aux_lidar_en: false

    # ── Frames ──────────────────────────────────────────────────
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # ── Keyframing ──────────────────────────────────────────────
    keyframe_dist: 2.0
    keyframe_rot:  45.0

    # ── TDF Grid ────────────────────────────────────────────────
    tdfGridSizeX_low:   -50.0
    tdfGridSizeX_high:  100.0
    tdfGridSizeY_low:   -50.0
    tdfGridSizeY_high:   50.0
    tdfGridSizeZ_low:   -50.0
    tdfGridSizeZ_high:   50.0
    tdf_grid_res:         0.05

    # ── Solver ──────────────────────────────────────────────────
    solver_max_iter:    500
    solver_max_threads:  20
    robust_outlier_dist:  0.5

    # ── Point Cloud Processing ──────────────────────────────────
    lidar_type:      "ouster"
    min_range:        1.0
    max_range:      100.0
    leaf_size_map:   -1.0
    leaf_size_opt:   -1.0
    kGridMarginFactor: 0.8
    maxload:        100.0
    maxCells:       100000
