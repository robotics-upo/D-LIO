dlio_node:
  ros__parameters:

    # ── ROS Topics ──────────────────────────────────────────────
    in_cloud:     "/hesai/pandar"
    in_cloud_aux: "/os1_cloud_node2/points"
    in_imu:       "/mti3dk/imu"

    # ── Sensor Frequencies ──────────────────────────────────────
    hz_cloud: 10.0
    hz_imu:   100.0

    # ── ESKF ────────────────────────────────────────────────────
    calibration_time:  5.0
    use_fixed_imu_dt:  true
    imu_acc_in_ms2:    true
    gyr_dev:           5.236e-04
    gyr_rw_dev:        3.4e-05
    acc_dev:           7.0e-03
    acc_rw_dev:        2.5e-09

    # ── Multi-LiDAR ────────────────────────────────────────────
    aux_lidar_en: false

    # ── Frames ──────────────────────────────────────────────────
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # ── Keyframing ──────────────────────────────────────────────
    keyframe_dist: 2.0
    keyframe_rot:  0.5

    # ── TDF Grid ────────────────────────────────────────────────
    tdfGridSizeX_low:   -30.0
    tdfGridSizeX_high:  100.0
    tdfGridSizeY_low:  -100.0
    tdfGridSizeY_high:  100.0
    tdfGridSizeZ_low:  -100.0
    tdfGridSizeZ_high:  100.0
    tdf_grid_res:         0.05

    # ── Solver ──────────────────────────────────────────────────
    solver_max_iter:    200
    solver_max_threads:  20
    robust_outlier_dist:  0.5

    # ── Point Cloud Processing ──────────────────────────────────
    lidar_type:      "ouster"
    min_range:        1.0
    max_range:      200.0
    leaf_size_map:   -1.0
    leaf_size_opt:   -1.0
    kGridMarginFactor: 0.8
    maxload:        200.0
    maxCells:       350000
