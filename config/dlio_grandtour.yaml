dlio_node:
  ros__parameters:

    # ── ROS Topics ──────────────────────────────────────────────
    in_cloud:     "/boxi/hesai/points"
    in_cloud_aux: "/os1_cloud_node2/points"
    in_imu:       "/boxi/stim320/imu"

    # ── Sensor Frequencies ──────────────────────────────────────
    hz_cloud: 10.0
    hz_imu:   500.0

    # ── ESKF ────────────────────────────────────────────────────
    calibration_time:  1.0
    use_fixed_imu_dt:  true
    imu_acc_in_ms2:    true
    gyr_dev:           0.05
    gyr_rw_dev:        3.4e-09
    acc_dev:           0.05
    acc_rw_dev:        2.5e-09

    # ── Multi-LiDAR ────────────────────────────────────────────
    aux_lidar_en: false

    # ── Frames ──────────────────────────────────────────────────
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # ── Keyframing ──────────────────────────────────────────────
    keyframe_dist: 1.0
    keyframe_rot:  1.7

    # ── TDF Grid ────────────────────────────────────────────────
    tdfGridSizeX_low:   -30.0
    tdfGridSizeX_high:  100.0
    tdfGridSizeY_low:  -100.0
    tdfGridSizeY_high:  100.0
    tdfGridSizeZ_low:  -100.0
    tdfGridSizeZ_high:  100.0
    tdf_grid_res:         0.05

    # ── Solver ──────────────────────────────────────────────────
    solver_max_iter:    200
    solver_max_threads:  20
    robust_outlier_dist:  0.75

    # ── Point Cloud Processing ──────────────────────────────────
    lidar_type:      "hesai"
    min_range:        0.5
    max_range:      200.0
    leaf_size_map:   -1.0
    leaf_size_opt:   -1.0
    kGridMarginFactor: 0.8
    maxload:         15.0
    maxCells:       200000
